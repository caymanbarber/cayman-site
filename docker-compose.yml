services:
  caddy:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/var/log/caddy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    volumes:
      - ${HOME}/.cloudflared:/etc/cloudflared
    depends_on:
      - caddy
    restart: unless-stopped

